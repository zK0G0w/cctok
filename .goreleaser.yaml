project_name: cctok

builds:
  - main: .
    binary: cctok
    ldflags:
      - -s -w -X cctok/cmd.version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: zK0G0w
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/zK0G0w/cctok"
    description: "CLI tool for tracking Claude Code & Codex token usage and costs"

changelog:
  sort: asc
